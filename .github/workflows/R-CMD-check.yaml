# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: macOS-latest, r: "release" }
          - { os: windows-latest, r: "release" }
          - { os: ubuntu-latest, r: "devel", http-user-agent: "release" }
          - { os: ubuntu-latest, r: "release" }
          - { os: ubuntu-latest, r: "oldrel-1" }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y jags pkg-config libnlopt-dev libglpk-dev libxml2-dev \
          libcurl4-openssl-dev libharfbuzz-dev libfribidi-dev libfontconfig1-dev \
          libarchive-dev libgit2-dev libssh2-1-dev libssl-dev libfreetype6-dev
          echo "JAGS_HOME=/usr" >> $GITHUB_ENV

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install jags
          echo "JAGS_HOME=$(brew --prefix jags)" >> $GITHUB_ENV
          echo "LDFLAGS=-L$(brew --prefix jags)/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I$(brew --prefix jags)/include" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix jags)/lib/pkgconfig" >> $GITHUB_ENV
          # CRAN binary rjags.so hard-codes /usr/local/lib (Intel path); symlink for Apple Silicon runners
          sudo mkdir -p /usr/local/lib
          sudo ln -sf "$(brew --prefix jags)/lib/libjags.4.dylib" /usr/local/lib/libjags.4.dylib

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $url = "https://sourceforge.net/projects/mcmc-jags/files/JAGS/4.x/Windows/JAGS-4.3.1.exe/download"
          $output = "jags.exe"
          curl.exe -L $url -o $output
          Start-Process -FilePath $output -ArgumentList "/S" -Wait
          echo "JAGS_HOME=C:\Program Files\JAGS\JAGS-4.3.1" >> $env:GITHUB_ENV
          echo "C:\Program Files\JAGS\JAGS-4.3.1\x64\bin" >> $env:GITHUB_PATH

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          error-on: '"error"'
